name: Get SHA-1

on:
  workflow_dispatch:

jobs:
  get-sha1:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: List all aliases
        run: |
          echo "=== All aliases in keystore ==="
          keytool -list -keystore release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" || echo "Failed to list aliases"

      - name: Get SHA-1 fingerprint
        run: |
          echo "=== SHA-1 for alias: ${{ secrets.KEY_ALIAS }} ==="
          keytool -list -v -keystore release.keystore -alias "${{ secrets.KEY_ALIAS }}" -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep SHA1 || echo "Failed to get SHA-1"
