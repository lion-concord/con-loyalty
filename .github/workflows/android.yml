name: Build Android APK & AAB (RuStore)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
      VITE_APP_VERSION: 0.1.${{ github.run_number }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_ENABLE_CRYPTO: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --no-save @capacitor/cli@8.3.1

      - name: Build VK ID plugin
        run: |
          cd plugins/capacitor-vk-id
          npm install --no-audit --no-fund
          npm run build
          cd ../..

      - name: Build RuStore web bundle
        run: npm run build:rustore

      - name: Sync Capacitor with Android
        run: npx --no-install cap sync android

      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          cat > android/keystore.properties << EOF2
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASS }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF2

      - name: Verify debug.keystore exists
        run: |
          ls -la android/app/debug.keystore
          file android/app/debug.keystore

      - name: Configure debug signing
        run: |
          echo "android.injected.signing.store.file=$(pwd)/android/app/debug.keystore" >> android/gradle.properties
          echo "android.injected.signing.store.password=android" >> android/gradle.properties
          echo "android.injected.signing.key.alias=androiddebugkey" >> android/gradle.properties
          echo "android.injected.signing.key.password=android" >> android/gradle.properties

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Sign debug APK with apksigner
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks android/app/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build release AAB
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        run: ./gradlew bundleRelease


      - name: Build release APK
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        run: ./gradlew assembleRelease


      - name: Upload release APK
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kon-loyalty-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kon-loyalty-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk


      - name: Upload release AAB
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kon-loyalty-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Verify keystore exists
        if: env.HAS_KEYSTORE == 'true'
        run: |
          ls -lh android/app/release.keystore
          file android/app/release.keystore

      - name: Verify keystore content
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "Testing keystore with keytool..."
          keytool -list -v -keystore android/app/release.keystore -storepass android123 -alias kon-release | head -20
