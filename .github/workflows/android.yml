name: Build Android APK & AAB (RuStore)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --no-save @capacitor/cli@8.3.1

      - name: Debug Capacitor install
        run: |
          echo "=== node_modules/.bin (cap*) ==="
          ls -la node_modules/.bin/ 2>/dev/null | grep -i cap || echo "cap NOT FOUND"
          echo "=== @capacitor folder ==="
          ls -la node_modules/@capacitor/ 2>/dev/null || echo "@capacitor NOT FOUND"
          echo "=== npx cap --version ==="
          npx cap --version || echo "npx cap failed"

      - name: Build RuStore web bundle
        run: npm run build:rustore

      - name: Sync Capacitor with Android
        run: npx --no-install cap sync android

      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          cat > android/keystore.properties << EOF2
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF2

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release AAB
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kon-loyalty-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload release AAB
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kon-loyalty-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
