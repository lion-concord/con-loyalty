name: Build Android APK & AAB (RuStore)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build RuStore web bundle
        run: npm run build:rustore

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          cat > android/keystore.properties << EOF
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kon-loyalty-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: kon-loyalty-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
