apply plugin: 'com.android.application'

// Загружаем keystore.properties, если существует
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
println "🔑 HAS_KEYSTORE: ${hasKeystore}"
if (hasKeystore) {
    println "🔑 Keystore file: ${keystoreProperties['storeFile']}"
    println "🔑 Full path: ${file(keystoreProperties['storeFile']).absolutePath}"
}

// versionCode автоматически растёт на каждой сборке в CI
def ciRunNumber = System.getenv("GITHUB_RUN_NUMBER")
def computedVersionCode = ciRunNumber ? ciRunNumber.toInteger() : 1

android {
    namespace = "ru.konconsulting.loyalty"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "ru.konconsulting.loyalty"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode computedVersionCode
        versionName "1.0." + (ciRunNumber ?: "0")
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        manifestPlaceholders = [
            VKIDRedirectScheme: "vk54574930",
            VKIDRedirectHost: "vk.com",
            VKIDClientID: "54574930",
            VKIDClientSecret: "n7ehhGncqGbhTFmrRcbf"
        ]
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        if (hasKeystore) {
            release {
                storeFile file(keystoreProperties['storeFile'])
            println "🔐 Resolved storeFile path: ${storeFile.absolutePath}"
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
        debug {
            storeFile file("${projectDir}/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasKeystore) {
                signingConfig signingConfigs.release
                println "✅ Signing config applied: ${signingConfig.name}"
            }
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
    implementation "com.vk.id:onetap-xml:2.1.0"
    
    implementation "com.google.crypto.tink:tink-android:1.10.0"
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
